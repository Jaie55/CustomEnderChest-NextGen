name: Gradle Build

on:
  push:
    branches:
      - 'master'
      - 'dev'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches:
      - 'master'
      - 'dev'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71902bea5b382103f6f36402377a062f689f # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@99b8673f75249f70691507f353163351d52d9a60 # v4.2.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac2d3402681580227181057e0407d57c790101c5 # v3.5.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep 'version =' build.gradle | head -n 1 | awk -F "'" '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "COMMIT_SHA_SHORT=$COMMIT_SHA_SHORT" >> $GITHUB_ENV
          echo "Version: $VERSION (Commit: $COMMIT_SHA_SHORT)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: CustomEnderChest-NextGen-${{ env.VERSION }}
          path: build/libs/CustomEnderChest-NextGen-${{ env.VERSION }}.jar
          retention-days: 90
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: test-reports-${{ env.COMMIT_SHA_SHORT }}
          path: build/reports/tests/
          retention-days: 7
